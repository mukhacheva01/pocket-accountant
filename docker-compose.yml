# docker-compose.yml — единственная точка входа: docker compose up -d
x-app: &app-base
  build:
    context: .
    dockerfile: docker/Dockerfile
  env_file: .env
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_started

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pocket_accountant}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  backend:
    <<: *app-base
    command: ["python", "-m", "backend.entrypoint"]
    ports:
      - "${API_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8080/health').raise_for_status()"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  bot:
    <<: *app-base
    command: ["python", "-m", "bot.entrypoint"]
    environment:
      APP_BASE_URL: http://backend:8080
    depends_on:
      backend:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    <<: *app-base
    command: ["python", "-m", "worker.entrypoint"]

  nginx:
    image: nginx:1.27-alpine
    profiles: ["webhook"]
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/accountant-bot.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pg_data:
  redis_data:
