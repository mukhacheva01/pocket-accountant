x-app-image: &app-image
  image: pocket-accountant-bot:prod
  build:
    context: ..
    dockerfile: Dockerfile

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: accountant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - accountant_postgres:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - accountant_redis:/data

  migrate:
    <<: *app-image
    env_file:
      - ../.env
    command: alembic upgrade head
    depends_on:
      - postgres

  api:
    <<: *app-image
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis

  bot:
    <<: *app-image
    restart: unless-stopped
    env_file:
      - ../.env
    command: python -m accountant_bot.bot.polling
    depends_on:
      - postgres
      - redis

  worker:
    <<: *app-image
    restart: unless-stopped
    env_file:
      - ../.env
    command: python -m accountant_bot.jobs.worker
    depends_on:
      - postgres
      - redis

  nginx:
    image: nginx:1.27
    profiles: ["webhook"]
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/accountant-bot.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  accountant_postgres:
  accountant_redis:
